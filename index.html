<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computer Vision arXiv Digest</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Daily cs.CV digest</p>
        <h1>Computer Vision arXiv Digest</h1>
        <p class="subhead">A quieter, cleaner daily view of the best new computer vision papers, with instant date filtering and expandable full listings.</p>
      </div>
      <div class="hero-meta">
        <div class="stat">
          <span class="stat-label">Mode</span>
          <strong>Daily top 5</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Source</span>
          <strong>arXiv cs.CV</strong>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <div>
        <label for="day-filter">Filter by day</label>
        <select id="day-filter"></select>
      </div>
      <div>
        <label for="search-input">Find a paper</label>
        <input id="search-input" type="search" placeholder="Search titles and summaries" />
      </div>
    </section>

    <main id="app"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
