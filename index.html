<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV ArXiv Digest</title>
  <meta name="description" content="A premium daily briefing of the most notable new computer vision papers from arXiv cs.CV." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header simple-header">
      <a class="brand" href="#top">CV ArXiv Digest</a>
      <div class="header-meta">Top 5, date selector, search</div>
    </header>

    <main id="top">
      <section id="digest" class="digest-shell section">
        <div class="section-heading digest-heading simple-heading">
          <div>
            <p class="eyebrow">Daily cs.CV</p>
            <h1>Top 5 notable papers</h1>
          </div>
          <p class="section-note">Choose a date or search titles and summaries.</p>
        </div>

        <section class="toolbar glass-panel">
          <div>
            <label for="day-filter">Date</label>
            <select id="day-filter"></select>
          </div>
          <div>
            <label for="search-input">Search</label>
            <input id="search-input" type="search" placeholder="Search papers" />
          </div>
        </section>

        <div id="app"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
